services:
  # Backend — Node.js/Express API
  - type: web
    name: smarttaskmanager-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # set to your frontend Render URL, e.g. https://smarttaskmanager-client.onrender.com

  # Frontend — React/Vite static site
  - type: web
    name: smarttaskmanager-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend Render URL, e.g. https://smarttaskmanager-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
